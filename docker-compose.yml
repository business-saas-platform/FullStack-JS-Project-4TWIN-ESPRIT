# Configured for local deployment on a Tunisian server to satisfy Law No. 2004-63.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./Back-End/.env
    environment:
      NODE_ENV: production
      TENANT_ID: ''
      TENANT_REGION: 'TN'
      TENANT_TIER: ''
    depends_on:
      - db
    networks:
      - internal_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal_net

volumes:
  db_data:

networks:
  internal_net:
    driver: bridge
