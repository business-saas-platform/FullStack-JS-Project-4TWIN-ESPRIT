apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rihabcht/backendtest1 
          ports:
            - containerPort: 3000
          env:
            # Database
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASS
              value: "0000"
            - name: DB_NAME
              value: saas_db

            # Server
            - name: PORT
              value: "3000"
            - name: CORS_ORIGINS
              value: "http://192.168.49.2:30080"

            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "1d"

            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              value: "139367425386-adode57vimn2u5t7d7c3pvm1nkpbjtce.apps.googleusercontent.com"
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              value: "http://192.168.49.2:30082/api/auth/google/callback"

            # GitHub OAuth
            - name: GITHUB_CLIENT_ID
              value: "Ov23liNcYt110QwMbEfh"
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GITHUB_CLIENT_SECRET
            - name: GITHUB_CALLBACK_URL
              value: "http://192.168.49.2:30082/api/auth/github/callback"

            # Mail
            - name: MAIL_HOST
              value: "smtp.gmail.com"
            - name: MAIL_PORT
              value: "587"
            - name: MAIL_USER
              value: "rahouejaziz3@gmail.com"
            - name: MAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MAIL_PASS

            # Frontend
            - name: FRONTEND_URL
              value: "http://192.168.49.2:30080"

--- 
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30082
  type: NodePort